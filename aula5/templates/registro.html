<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Criar Conta</title>
</head>

<body>
    <h1>Registro de Novo Usuário</h1>

    <label>Nome:</label> <br>
    <input type="text" id="nome"><br><br>

    <label>Senha:</label> <br>
    <input type="password" id="senha"><br><br>

    <label>Bio:</label> <br>
    <textarea id="bio"></textarea><br><br>

    <button onclick="registrar()">Criar Conta</button>
    <p>Já tem conta? <a href="/login">Faça login</a></p>

    <script>
        async function registrar() {
            const dados = {
                nome: document.getElementById('nome').value,
                senha: document.getElementById('senha').value,
                bio: document.getElementById('bio').value
            };

            const resposta = await fetch('/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            if (resposta.ok) {
                alert("Conta criada! Redirecionando para login...");
                window.location.href = "/login";
            } else {
                alert("Erro ao criar conta.");
            }
        }
    </script>
</body>

</html>
