<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let valor = 2;
        function dobrar() {
            valor *= 2;
            document.querySelector('h1').innerHTML = valor;

            if (valor > 100) {
                alert(`Cuidado, o número ${valor} está ficando muito grande!`)
            }
        }
    </script>
</head>

<body>
    <h1>2</h1>
    <button onclick="dobrar()">Dobrar</button>
</body>

</html>
